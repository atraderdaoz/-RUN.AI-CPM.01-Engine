<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>©®™🏃🏿‍♂️RUN.AI CPM Engine</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:#fff; }
.container { max-width:1000px; margin:auto; padding:20px; }
.card { background:#161616; padding:20px; border-radius:12px; margin-bottom:20px; }
video,audio { width:100%; border-radius:10px; }
.stat { font-size:18px; margin:5px 0; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
input,select,button {
  width:100%; padding:10px; margin-top:10px;
  border:none; border-radius:6px;
}
button { background:#00c27a; color:#fff; font-weight:bold; cursor:pointer; }
#logoutBtn { background:red; }
</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div class="card" id="loginCard">
<h2>🔐 Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<button id="signupBtn">Sign Up</button>
<button id="googleBtn" style="background:#4285F4">Google</button>
<div class="stat">User: <span id="userStatus">Not logged in</span></div>
</div>

<button id="logoutBtn" style="display:none;">Logout</button>

<h1>©®™🏃🏿‍♂️RUN.AI CPM Engine</h1>

<!-- WALLET SUBSCRIPTION -->
<div class="card">
<h2>💳 Subscription (5 USDT)</h2>
<button id="connectBtn">Connect Wallet</button>
<button id="payBtn" disabled>Activate</button>
<div class="stat" id="wallet">Wallet: not connected</div>
<div class="stat" id="payStatus">Status: idle</div>
</div>

<!-- MEDIA -->
<div class="grid">
<div class="card">
<h2>🎥 Video 1</h2>
<video id="video1" controls><source src="VID-20260317-WA0001.mp4"></video>
<div class="stat">Plays: <span id="v1">0</span></div>
</div>

<div class="card">
<h2>🎥 Video 2</h2>
<video id="video2" controls><source src="G-Riddim.mp4"></video>
<div class="stat">Plays: <span id="v2">0</span></div>
</div>
</div>

<div class="card">
<h2>🎧 Audio</h2>
<audio id="audio" controls><source src="lespri.mp3"></audio>
<div class="stat">Plays: <span id="a">0</span></div>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>📊 Dashboard</h2>
<div>Total Plays: <span id="total">0</span></div>
<div>Likes: <span id="likes">0</span></div>
<div>Total Revenue: $<span id="totalRev">0</span></div>
<button id="likeBtn">👍 Like</button>
</div>

<!-- CPM -->
<div class="card">
<h2>⚙️ CPM</h2>
<input id="base" value="1">
<button id="cpmBtn">Update CPM</button>
<div>CPM: $<span id="cpm">1</span></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc, increment
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// FIREBASE
const firebaseConfig = {
  apiKey:"AIzaSyCyLB2daQh2tJL9d8DWxUPRmuyIZu-8Zzg",
  authDomain:"run-ai-80fb7.firebaseapp.com",
  projectId:"run-ai-80fb7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// DOM FIX (CRITICAL)
const email = document.getElementById("email");
const password = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");
const googleBtn = document.getElementById("googleBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userStatus = document.getElementById("userStatus");
const loginCard = document.getElementById("loginCard");

const connectBtn = document.getElementById("connectBtn");
const payBtn = document.getElementById("payBtn");
const walletUI = document.getElementById("wallet");
const payStatus = document.getElementById("payStatus");

const video1 = document.getElementById("video1");
const video2 = document.getElementById("video2");
const audio = document.getElementById("audio");

// AUTH
onAuthStateChanged(auth,(user)=>{
  if(user){
    userStatus.innerText=user.email;
    loginCard.style.display="none";
    logoutBtn.style.display="block";
  } else {
    userStatus.innerText="Not logged in";
    loginCard.style.display="block";
    logoutBtn.style.display="none";
  }
});

loginBtn.onclick = ()=>signInWithEmailAndPassword(auth,email.value,password.value);
signupBtn.onclick = async ()=>{
  const c = await createUserWithEmailAndPassword(auth,email.value,password.value);
  await setDoc(doc(db,"users",c.user.uid),{totalEarnings:0});
};
googleBtn.onclick = ()=>signInWithPopup(auth,new GoogleAuthProvider());
logoutBtn.onclick = ()=>signOut(auth);

// FIRESTORE DATA
const ref = doc(db,"run_ai_metrics","dashboard");

if(!(await getDoc(ref)).exists()){
  await setDoc(ref,{video1:0,video2:0,audio:0,likes:0,cpm:1});
}

let CPM=1;

onSnapshot(ref,(snap)=>{
  let d=snap.data();
  let v1=d.video1||0,v2=d.video2||0,a=d.audio||0;

  document.getElementById("v1").innerText=v1;
  document.getElementById("v2").innerText=v2;
  document.getElementById("a").innerText=a;

  document.getElementById("total").innerText=v1+v2+a;
  document.getElementById("likes").innerText=d.likes;

  CPM=d.cpm||1;
  document.getElementById("cpm").innerText=CPM;

  let rev=((v1+v2+a)/1000)*CPM;
  document.getElementById("totalRev").innerText=rev.toFixed(2);
});

// CPM
document.getElementById("cpmBtn").onclick = async ()=>{
  CPM = +document.getElementById("base").value;
  await updateDoc(ref,{cpm:CPM});
};

// TRACKING
video1.onplay = ()=>updateDoc(ref,{video1:increment(1)});
video2.onplay = ()=>updateDoc(ref,{video2:increment(1)});
audio.onplay = ()=>updateDoc(ref,{audio:increment(1)});
document.getElementById("likeBtn").onclick = ()=>updateDoc(ref,{likes:increment(1)});

// WALLET (FIXED)
let provider, signer, userAddr;

connectBtn.onclick = async ()=>{
  if(!window.ethereum){
    payStatus.innerText="No wallet";
    return;
  }

  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);
  signer = provider.getSigner();
  userAddr = await signer.getAddress();

  walletUI.innerText=userAddr;
  payBtn.disabled=false;
};

payBtn.onclick = async ()=>{
  const USDT="0x55d398326f99059fF775485246999027B3197955";
  const to="0xe5e170739f5ba2a01e1ba878e8a0580a0f247a23";

  const ABI=[
    "function transfer(address to,uint amount) returns(bool)",
    "function decimals() view returns(uint8)"
  ];

  const token=new ethers.Contract(USDT,ABI,signer);
  const d=await token.decimals();
  const amt=ethers.utils.parseUnits("5",d);

  const tx=await token.transfer(to,amt);
  payStatus.innerText="Sending...";
  await tx.wait();

  payStatus.innerText="Subscription Active";
};
</script>
</body>
</html>
