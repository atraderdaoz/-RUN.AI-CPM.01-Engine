<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ﾂｩﾂｮ邃｢宖純宖樵窶坂凾髹蹴UN.AI CPM Engine</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: #fff;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #161616;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

video, audio {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.stat {
  font-size: 20px;
  margin: 6px 0;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #00c27a;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>ﾂｩﾂｮ邃｢宖純宖樵窶坂凾髹蹴UN.AI CPM Engine</h1>

<!-- VIDEO 1 -->
<div class="card">
<h3>Video 1</h3>
<video id="video1" controls>
  <source src="VID-20260317-WA0001.mp4" type="video/mp4">
</video>

<div class="stat">Plays: <span id="v1plays">0</span></div>
</div>

<!-- VIDEO 2 -->
<div class="card">
<h3>Video 2</h3>
<video id="video2" controls>
  <source src="recording5.mp4" type="video/mp4">
</video>

<div class="stat">Plays: <span id="v2plays">0</span></div>
</div>

<!-- AUDIO -->
<div class="card">
<h3>Audio Track</h3>
<audio id="audio" controls>
  <source src="lespri.mp3" type="audio/mpeg">
</audio>

<div class="stat">Audio Plays: <span id="aplay">0</span></div>
</div>

<!-- GLOBAL -->
<div class="card">
<h3>Global Engagement</h3>

<div class="stat">Total Plays: <span id="totalPlays">0</span></div>
<div class="stat">Likes: <span id="likes">0</span></div>
<div class="stat">Like Rate: <span id="rate">0%</span></div>

<button onclick="like()">宖総 Like</button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc, increment } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyLB2daQh2tJL9d8DWxUPRmuyIZu-8Zzg",
  authDomain: "run-ai-80fb7.firebaseapp.com",
  projectId: "run-ai-80fb7",
  storageBucket: "run-ai-80fb7.firebasestorage.app",
  messagingSenderId: "962298240212",
  appId: "1:962298240212:web:6642a45e94a6f583e3ef41"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "run_ai_metrics", "multi_media");

async function init() {
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      video1: 0,
      video2: 0,
      audio: 0,
      likes: 0
    });
  }
}
init();

onSnapshot(ref, (snap) => {
  const d = snap.data();

  document.getElementById("v1plays").innerText = d.video1;
  document.getElementById("v2plays").innerText = d.video2;
  document.getElementById("aplay").innerText = d.audio;

  let total = d.video1 + d.video2 + d.audio;

  document.getElementById("totalPlays").innerText = total;
  document.getElementById("likes").innerText = d.likes;

  let rate = total > 0 ? (d.likes / total) * 100 : 0;
  document.getElementById("rate").innerText = rate.toFixed(2) + "%";
});

// TRACKERS
let v1 = false, v2 = false, a = false;

document.getElementById("video1").addEventListener("play", async () => {
  if (!v1) {
    v1 = true;
    await updateDoc(ref, { video1: increment(1) });
  }
});
document.getElementById("video1").onended = () => v1 = false;

document.getElementById("video2").addEventListener("play", async () => {
  if (!v2) {
    v2 = true;
    await updateDoc(ref, { video2: increment(1) });
  }
});
document.getElementById("video2").onended = () => v2 = false;

document.getElementById("audio").addEventListener("play", async () => {
  if (!a) {
    a = true;
    await updateDoc(ref, { audio: increment(1) });
  }
});
document.getElementById("audio").onended = () => a = false;

// LIKE
window.like = async function () {
  await updateDoc(ref, { likes: increment(1) });
};
</script>

</body>
</html>
