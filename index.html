<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>©®™🏃🏿‍♂️RUN.AI CPM Engine</title>
<style>
body {
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:#fff;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card {
  background:#161616;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

video,audio {
  width:100%;
}

.stat {
  margin:5px 0;
}

input,select,button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#222;
  color:#fff;
  border:none;
  border-radius:6px;
}

button {
  background:#00c27a;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>©®™🏃🏿‍♂️RUN.AI CPM Engine</h1>

<!-- AUTH -->
<div class="card" id="authBox">
<h2>Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- MEDIA -->
<div class="grid">

<div class="card">
<h2>🎥 Video 1</h2>
<video id="video1" controls>
<source src="VID-20260317-WA0001.mp4">
</video>
<div class="stat">Plays: <span id="v1">0</span></div>
<div class="stat">Revenue: $<span id="rev1">0</span></div>
</div>

<div class="card">
<h2>🎥 Video 2</h2>
<video id="video2" controls>
<source src="recording5.mp4">
</video>
<div class="stat">Plays: <span id="v2">0</span></div>
<div class="stat">Revenue: $<span id="rev2">0</span></div>
</div>

</div>

<div class="card">
<h2>🎧 Audio</h2>
<audio id="audio" controls>
<source src="lespri.mp3">
</audio>
<div class="stat">Plays: <span id="a">0</span></div>
<div class="stat">Revenue: $<span id="revA">0</span></div>
</div>

<!-- CPM -->
<div class="card">
<h2>⚙️ CPM Settings</h2>

<select id="location">
<option value="tanzania">Tanzania</option>
<option value="africa">Africa</option>
<option value="international">International</option>
</select>

<select id="audience">
<option value="general">General</option>
<option value="crypto">Crypto</option>
</select>

<input id="engagement" value="5">
<input id="base" value="1">

<button onclick="updateCPM()">Update CPM</button>

<div>CPM: $<span id="cpm">1</span></div>
</div>

<!-- GLOBAL -->
<div class="card">
<h2>📊 Platform Dashboard</h2>
<div>Total Plays: <span id="total">0</span></div>
<div>Likes: <span id="likes">0</span></div>
<div>Revenue: $<span id="totalRev">0</span></div>

<button onclick="like()">👍 Like</button>
</div>

<!-- CREATOR -->
<div class="card">
<h2>👤 Creator Dashboard</h2>
<div>Email: <span id="userEmail"></span></div>
<div>Total Earnings: $<span id="earnings">0</span></div>
<div>Withdrawable: $<span id="balance">0</span></div>

<button onclick="requestPayout()">💸 Request Payout</button>
<button onclick="logout()">Logout</button>
</div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, increment, collection, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCyLB2daQh2tJL9d8DWxUPRmuyIZu-8Zzg",
authDomain:"run-ai-80fb7.firebaseapp.com",
projectId:"run-ai-80fb7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ref = doc(db,"run_ai_metrics","dashboard");

let CPM = 1;

// INIT
async function init(){
const snap = await getDoc(ref);
if(!snap.exists()){
await setDoc(ref,{video1:0,video2:0,audio:0,likes:0});
}
}
init();

// AUTH
window.signup = async ()=>{
let email=emailInput.value;
let pass=password.value;

let u=await createUserWithEmailAndPassword(auth,email,pass);

await setDoc(doc(db,"users",u.user.uid),{
email,
totalEarnings:0,
withdrawableBalance:0
});
};

window.login = async ()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = ()=>signOut(auth);

// AUTH STATE
onAuthStateChanged(auth, async(user)=>{
if(user){
authBox.style.display="none";
app.style.display="block";

userEmail.innerText=user.email;

let snap=await getDoc(doc(db,"users",user.uid));
let d=snap.data();

earnings.innerText=d.totalEarnings.toFixed(2);
balance.innerText=d.withdrawableBalance.toFixed(2);

}else{
authBox.style.display="block";
app.style.display="none";
}
});

// CPM
window.updateCPM=()=>{
let base=parseFloat(base.value);
let eng=parseFloat(engagement.value);
let L={tanzania:0.5,africa:1,international:3}[location.value];
let A={general:1,crypto:3}[audience.value];
let E=1+(eng/100)*5;

CPM=base*L*A*E;
cpm.innerText=CPM.toFixed(2);
};

// LIVE
onSnapshot(ref,(snap)=>{
let d=snap.data();

let v1=d.video1||0;
let v2=d.video2||0;
let a=d.audio||0;

document.getElementById("v1").innerText=v1;
document.getElementById("v2").innerText=v2;
document.getElementById("a").innerText=a;

let total=v1+v2+a;

totalEl.innerText=total;
likes.innerText=d.likes;

let r1=(v1/1000)*CPM;
let r2=(v2/1000)*CPM;
let rA=(a/1000)*CPM;

rev1.innerText=r1.toFixed(2);
rev2.innerText=r2.toFixed(2);
revA.innerText=rA.toFixed(2);

totalRev.innerText=(r1+r2+rA).toFixed(2);
});

// TRACK
let f1=false,f2=false,f3=false;

video1.onplay=async()=>{if(!f1){f1=true;await updateDoc(ref,{video1:increment(1)});}};
video1.onended=()=>f1=false;

video2.onplay=async()=>{if(!f2){f2=true;await updateDoc(ref,{video2:increment(1)});}};
video2.onended=()=>f2=false;

audio.onplay=async()=>{if(!f3){f3=true;await updateDoc(ref,{audio:increment(1)});}};
audio.onended=()=>f3=false;

window.like=async()=>{await updateDoc(ref,{likes:increment(1)});};

// PAYOUT
window.requestPayout=async()=>{
let user=auth.currentUser;
let snap=await getDoc(doc(db,"users",user.uid));
let d=snap.data();

if(d.withdrawableBalance<=0){
alert("No balance");
return;
}

await addDoc(collection(db,"payouts"),{
userId:user.uid,
amount:d.withdrawableBalance,
status:"pending",
created:Date.now()
});

await updateDoc(doc(db,"users",user.uid),{
withdrawableBalance:0
});

alert("Payout requested");
};
</script>

</body>
</html>
