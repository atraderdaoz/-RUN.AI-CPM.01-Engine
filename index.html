<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc, increment } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// GLOBALS
let db, auth, ref, CPM = 1;
let provider, signer;

// INIT APP SAFELY
async function init(){
  try{
    const app = initializeApp({
      apiKey:"AIzaSyCyLB2daQh2tJL9d8DWxUPRmuyIZu-8Zzg",
      authDomain:"run-ai-80fb7.firebaseapp.com",
      projectId:"run-ai-80fb7",
      storageBucket:"run-ai-80fb7.appspot.com",
      messagingSenderId:"962298240212",
      appId:"1:962298240212:web:6642a45e94a6f583e3ef41"
    });

    db = getFirestore(app);
    auth = getAuth(app);
    ref = doc(db,"run_ai_metrics","dashboard");

    // SAFE INIT DATA
    const snap = await getDoc(ref);
    if(!snap.exists()){
      await setDoc(ref,{
        video1:0,
        video2:0,
        audio:0,
        likes:0,
        cpm:1
      });
    }

    bindAuth();
    bindUI();
    startListeners();

  }catch(e){
    console.error(e);
    alert("System failed to load");
  }
}

init();


// ================= AUTH =================
function bindAuth(){

  onAuthStateChanged(auth,user=>{
    userStatus.innerText = user ? user.email : "Not logged in";
  });

  loginBtn.onclick = async ()=>{
    try{
      await signInWithEmailAndPassword(auth,email.value,password.value);
    }catch(e){ alert(e.message); }
  };

  signupBtn.onclick = async ()=>{
    try{
      const u = await createUserWithEmailAndPassword(auth,email.value,password.value);
      await setDoc(doc(db,"users",u.user.uid),{
        totalEarnings:0,
        withdrawableBalance:0
      });
    }catch(e){ alert(e.message); }
  };

  googleBtn.onclick = async ()=>{
    try{
      await signInWithPopup(auth,new GoogleAuthProvider());
    }catch(e){ alert(e.message); }
  };
}


// ================= DATA =================
function startListeners(){

  onSnapshot(ref,(snap)=>{
    const d = snap.data();

    const v1 = d.video1 || 0;
    const v2 = d.video2 || 0;
    const a  = d.audio || 0;

    const total = v1 + v2 + a;

    document.getElementById("v1").innerText = v1;
    document.getElementById("v2").innerText = v2;
    document.getElementById("a").innerText  = a;
    document.getElementById("likes").innerText = d.likes || 0;
    document.getElementById("total").innerText = total;

    CPM = d.cpm || 1;
    document.getElementById("cpm").innerText = CPM;
    document.getElementById("rev").innerText = ((total/1000)*CPM).toFixed(2);
  });

}


// ================= UI =================
function bindUI(){

  // ANTI-REPLAY CONTROL
  let f1=false, f2=false, f3=false;

  video1.onplay = async ()=>{
    if(!f1){
      f1=true;
      await updateDoc(ref,{video1:increment(1)});
    }
  };
  video1.onended = ()=> f1=false;

  video2.onplay = async ()=>{
    if(!f2){
      f2=true;
      await updateDoc(ref,{video2:increment(1)});
    }
  };
  video2.onended = ()=> f2=false;

  audio.onplay = async ()=>{
    if(!f3){
      f3=true;
      await updateDoc(ref,{audio:increment(1)});
    }
  };
  audio.onended = ()=> f3=false;

  likeBtn.onclick = ()=> updateDoc(ref,{likes:increment(1)});

  cpmBtn.onclick = async ()=>{
    const v = +base.value || 1;
    await updateDoc(ref,{cpm:v});
  };

  // WALLET SAFE
  connectBtn.onclick = async ()=>{
    try{
      if(!window.ethereum){
        alert("Install MetaMask");
        return;
      }

      provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts",[]);
      signer = provider.getSigner();

      wallet.innerText = await signer.getAddress();
      payBtn.disabled = false;

    }catch(e){
      alert(e.message);
    }
  };

  payBtn.onclick = async ()=>{
    try{
      if(!signer){
        alert("Connect wallet first");
        return;
      }

      const token = new ethers.Contract(
        "0x55d398326f99059fF775485246999027B3197955",
        [
          "function transfer(address,uint) returns(bool)",
          "function decimals() view returns(uint8)"
        ],
        signer
      );

      const decimals = await token.decimals();

      const tx = await token.transfer(
        "0xe5e170739f5ba2a01e1ba878e8a0580a0f247a23",
        ethers.utils.parseUnits("5", decimals)
      );

      payStatus.innerText = "Processing...";
      await tx.wait();

      payStatus.innerText = "Subscription Active ✅";

    }catch(e){
      console.error(e);
      payStatus.innerText = "Failed ❌";
    }
  };

}


// ================= NAV =================
window.show = (id)=>{
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
};

// COPY
window.copyDonate = ()=>{
  navigator.clipboard.writeText(donateAddr.value);
  alert("Copied");
};

</script>
