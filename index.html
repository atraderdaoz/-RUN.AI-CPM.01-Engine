<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>©®™🏃🏿‍♂️RUN.AI CPM Engine</title>

<style>
body {
  background:#0d0d0d;
  color:#fff;
  font-family:Arial;
  margin:0;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card {
  background:#161616;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input,button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

button {
  background:#00c27a;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>©®™🏃🏿‍♂️RUN.AI CPM Engine</h1>

<!-- AUTH -->
<div class="card" id="authBox">
<h2>Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard" style="display:none;">
<h2>Creator Dashboard</h2>

<div>Email: <span id="userEmail"></span></div>
<div>Total Earnings: $<span id="earnings">0</span></div>
<div>Withdrawable: $<span id="balance">0</span></div>

<button onclick="requestPayout()">💸 Request Payout</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyLB2daQh2tJL9d8DWxUPRmuyIZu-8Zzg",
  authDomain: "run-ai-80fb7.firebaseapp.com",
  projectId: "run-ai-80fb7",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SIGNUP
window.signup = async function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  let userCred = await createUserWithEmailAndPassword(auth,email,pass);

  await setDoc(doc(db,"users",userCred.user.uid),{
    email,
    totalEarnings:0,
    withdrawableBalance:0
  });
};

// LOGIN
window.login = async function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth,email,pass);
};

// LOGOUT
window.logout = () => signOut(auth);

// AUTH STATE
onAuthStateChanged(auth, async(user)=>{
  if(user){
    document.getElementById("authBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    document.getElementById("userEmail").innerText = user.email;

    let snap = await getDoc(doc(db,"users",user.uid));
    let data = snap.data();

    document.getElementById("earnings").innerText = data.totalEarnings.toFixed(2);
    document.getElementById("balance").innerText = data.withdrawableBalance.toFixed(2);

  } else {
    document.getElementById("authBox").style.display="block";
    document.getElementById("dashboard").style.display="none";
  }
});

// PAYOUT REQUEST
window.requestPayout = async function(){
  let user = auth.currentUser;
  let snap = await getDoc(doc(db,"users",user.uid));
  let data = snap.data();

  if(data.withdrawableBalance <= 0){
    alert("No balance");
    return;
  }

  await addDoc(collection(db,"payouts"),{
    userId:user.uid,
    amount:data.withdrawableBalance,
    status:"pending",
    created:Date.now()
  });

  await updateDoc(doc(db,"users",user.uid),{
    withdrawableBalance:0
  });

  alert("Payout requested");
};
</script>

</body>
</html>
